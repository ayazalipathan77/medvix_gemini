<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0072bc" />
      <stop offset="100%" stop-color="#003b73" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009245" />
      <stop offset="100%" stop-color="#39b54a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="20" flood-opacity="0.1" />
    </filter>
  </defs>

  <rect width="800" height="1000" fill="url(#bgGrad)" />

  <!-- Abstract Background Elements -->
  <circle cx="100" cy="100" r="250" fill="#0056b3" opacity="0.05" />
  <circle cx="700" cy="800" r="300" fill="#00a651" opacity="0.05" />
  <path d="M 0 500 Q 400 300 800 600 L 800 1000 L 0 1000 Z" fill="#ffffff" opacity="0.4" />

  <!-- Central Illustration -->
  <g transform="translate(150, 200)" filter="url(#shadow)">
    <!-- Main Window -->
    <rect width="500" height="600" rx="24" fill="#ffffff" />
    
    <!-- Header Bar -->
    <rect x="0" y="0" width="500" height="60" rx="24" fill="#f1f5f9" />
    <circle cx="30" cy="30" r="8" fill="#ef4444" />
    <circle cx="55" cy="30" r="8" fill="#eab308" />
    <circle cx="80" cy="30" r="8" fill="#22c55e" />

    <!-- Content Area -->
    <!-- Profile / User Icon -->
    <circle cx="250" cy="180" r="60" fill="url(#blueGrad)" />
    <circle cx="250" cy="165" r="25" fill="#ffffff" />
    <path d="M 215 210 Q 250 180 285 210 A 40 40 0 0 1 215 210" fill="#ffffff" />

    <!-- Data Rows -->
    <rect x="80" y="300" width="340" height="40" rx="10" fill="#f8fafc" />
    <rect x="100" y="315" width="150" height="10" rx="5" fill="#cbd5e1" />
    <rect x="350" y="315" width="50" height="10" rx="5" fill="#00a651" />

    <rect x="80" y="360" width="340" height="40" rx="10" fill="#f8fafc" />
    <rect x="100" y="375" width="120" height="10" rx="5" fill="#cbd5e1" />
    <rect x="350" y="375" width="50" height="10" rx="5" fill="#00a651" />

    <rect x="80" y="420" width="340" height="40" rx="10" fill="#f8fafc" />
    <rect x="100" y="435" width="180" height="10" rx="5" fill="#cbd5e1" />
    <rect x="350" y="435" width="50" height="10" rx="5" fill="#00a651" />

    <!-- Bottom Chart -->
    <path d="M 80 540 Q 150 480 250 520 T 420 460" fill="none" stroke="url(#greenGrad)" stroke-width="6" stroke-linecap="round" />
    <circle cx="420" cy="460" r="10" fill="#00a651" />
  </g>

  <!-- Floating Badges -->
  <g transform="translate(50, 400)" filter="url(#shadow)">
    <rect width="160" height="160" rx="80" fill="#ffffff" />
    <path d="M 60 80 L 75 95 L 105 65" fill="none" stroke="#00a651" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  </g>

  <g transform="translate(580, 600)" filter="url(#shadow)">
    <rect width="180" height="120" rx="20" fill="#0056b3" />
    <text x="90" y="60" font-family="Arial, sans-serif" font-weight="bold" font-size="36" fill="#ffffff" text-anchor="middle">99%</text>
    <text x="90" y="90" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.8" text-anchor="middle">Clean Claims</text>
  </g>
</svg>
