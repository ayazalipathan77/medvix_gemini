<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1200" width="100%" height="100%">
  <defs>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0056b3" />
      <stop offset="100%" stop-color="#003b73" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00a651" />
      <stop offset="100%" stop-color="#007a3b" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="1200" fill="#f8fafc" />

  <!-- Header -->
  <path d="M 0 0 L 800 0 L 800 300 Q 400 400 0 300 Z" fill="url(#headerGrad)" />
  <circle cx="700" cy="100" r="150" fill="url(#accentGrad)" opacity="0.8" />
  <circle cx="700" cy="100" r="100" fill="#ffffff" opacity="0.1" />

  <!-- Logo Placeholder -->
  <g transform="translate(50, 50)">
    <circle cx="40" cy="40" r="30" fill="#ffffff" />
    <path d="M 25 40 h 30 M 40 25 v 30" stroke="#0056b3" stroke-width="8" stroke-linecap="round" />
    <text x="90" y="50" font-family="Arial, sans-serif" font-weight="900" font-size="36" fill="#ffffff">MEDVIX SOLUTIONS</text>
  </g>

  <!-- Headline -->
  <g transform="translate(50, 180)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="#ffffff">Precision Billing.</text>
    <text x="0" y="60" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="#ffffff">Maximum Reimbursement.</text>
  </g>

  <!-- Main Content Box -->
  <g transform="translate(50, 350)" filter="url(#shadow)">
    <rect width="700" height="450" rx="20" fill="#ffffff" />
    
    <text x="50" y="60" font-family="Arial, sans-serif" font-weight="bold" font-size="28" fill="#0056b3">Our Core Services</text>
    
    <!-- Service 1 -->
    <g transform="translate(50, 100)">
      <circle cx="20" cy="20" r="20" fill="#e6f4ea" />
      <path d="M 12 20 L 18 26 L 28 14" fill="none" stroke="#00a651" stroke-width="4" stroke-linecap="round" />
      <text x="60" y="28" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#1e293b">Medical &amp; Dental Billing</text>
      <text x="60" y="55" font-family="Arial, sans-serif" font-size="16" fill="#64748b">End-to-end solutions tailored to your specialty.</text>
    </g>

    <!-- Service 2 -->
    <g transform="translate(50, 200)">
      <circle cx="20" cy="20" r="20" fill="#e6f4ea" />
      <path d="M 12 20 L 18 26 L 28 14" fill="none" stroke="#00a651" stroke-width="4" stroke-linecap="round" />
      <text x="60" y="28" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#1e293b">Complete RCM</text>
      <text x="60" y="55" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Manage the entire revenue cycle in 4 distinct phases.</text>
    </g>

    <!-- Service 3 -->
    <g transform="translate(50, 300)">
      <circle cx="20" cy="20" r="20" fill="#e6f4ea" />
      <path d="M 12 20 L 18 26 L 28 14" fill="none" stroke="#00a651" stroke-width="4" stroke-linecap="round" />
      <text x="60" y="28" font-family="Arial, sans-serif" font-weight="bold" font-size="22" fill="#1e293b">Provider Credentialing</text>
      <text x="60" y="55" font-family="Arial, sans-serif" font-size="16" fill="#64748b">Eliminate revenue delays with proper enrollment.</text>
    </g>
  </g>

  <!-- Stats Section -->
  <g transform="translate(50, 850)">
    <rect width="220" height="150" rx="15" fill="#0056b3" />
    <text x="110" y="70" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="#ffffff" text-anchor="middle">30%</text>
    <text x="110" y="110" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#e2e8f0" text-anchor="middle">Revenue Increase</text>

    <rect x="240" y="0" width="220" height="150" rx="15" fill="#00a651" />
    <text x="350" y="70" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="#ffffff" text-anchor="middle">40%</text>
    <text x="350" y="110" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#e2e8f0" text-anchor="middle">Less AR Days</text>

    <rect x="480" y="0" width="220" height="150" rx="15" fill="#0056b3" />
    <text x="590" y="70" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="#ffffff" text-anchor="middle">98%</text>
    <text x="590" y="110" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#e2e8f0" text-anchor="middle">Clean Claims</text>
  </g>

  <!-- Footer -->
  <g transform="translate(0, 1050)">
    <rect width="800" height="150" fill="#1e293b" />
    <text x="400" y="60" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#ffffff" text-anchor="middle">Schedule a Free Revenue Analysis Today</text>
    <text x="400" y="100" font-family="Arial, sans-serif" font-size="18" fill="#94a3b8" text-anchor="middle">contact@medvixsolutions.com | +1 (800) 123-4567</text>
  </g>
</svg>
