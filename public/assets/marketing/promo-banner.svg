<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0056b3" />
      <stop offset="100%" stop-color="#003b73" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00a651" />
      <stop offset="100%" stop-color="#007a3b" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" opacity="0.1" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bgGrad)" />
  <rect width="1200" height="300" fill="url(#dots)" />

  <!-- Abstract Shapes -->
  <circle cx="1100" cy="150" r="250" fill="url(#accentGrad)" opacity="0.8" />
  <circle cx="1100" cy="150" r="150" fill="#ffffff" opacity="0.1" />
  <path d="M -100 300 Q 200 100 500 300 Z" fill="#ffffff" opacity="0.05" />

  <!-- Content -->
  <g transform="translate(80, 100)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-weight="900" font-size="48" fill="#ffffff">Maximize Your Practice Revenue</text>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="24" fill="#e2e8f0">Expert Medical &amp; Dental Billing Solutions. Zero Guesswork.</text>
    
    <!-- CTA Button -->
    <g transform="translate(0, 80)">
      <rect width="240" height="60" rx="30" fill="url(#accentGrad)" />
      <text x="120" y="36" font-family="Arial, sans-serif" font-weight="bold" font-size="20" fill="#ffffff" text-anchor="middle">Get a Free Analysis</text>
    </g>
  </g>

  <!-- Stats -->
  <g transform="translate(850, 100)">
    <rect width="250" height="100" rx="15" fill="#ffffff" opacity="0.1" />
    <text x="125" y="45" font-family="Arial, sans-serif" font-weight="900" font-size="42" fill="#ffffff" text-anchor="middle">98%+</text>
    <text x="125" y="75" font-family="Arial, sans-serif" font-weight="bold" font-size="18" fill="#e2e8f0" text-anchor="middle">Clean Claim Rate</text>
  </g>
</svg>
