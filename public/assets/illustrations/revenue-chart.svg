<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00a651" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#00a651" stop-opacity="0.0" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0056b3" />
      <stop offset="100%" stop-color="#00a651" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="20" fill="#ffffff" />
  
  <!-- Grid Lines -->
  <g stroke="#e2e8f0" stroke-width="1" stroke-dasharray="5,5">
    <line x1="80" y1="100" x2="750" y2="100" />
    <line x1="80" y1="200" x2="750" y2="200" />
    <line x1="80" y1="300" x2="750" y2="300" />
    <line x1="80" y1="400" x2="750" y2="400" />
  </g>

  <!-- Y-Axis Labels -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="end">
    <text x="60" y="105">$1.2M</text>
    <text x="60" y="205">$900K</text>
    <text x="60" y="305">$600K</text>
    <text x="60" y="405">$300K</text>
  </g>

  <!-- X-Axis Labels -->
  <g font-family="Arial, sans-serif" font-size="14" fill="#64748b" text-anchor="middle">
    <text x="100" y="440">Jan</text>
    <text x="230" y="440">Feb</text>
    <text x="360" y="440">Mar</text>
    <text x="490" y="440">Apr</text>
    <text x="620" y="440">May</text>
    <text x="750" y="440">Jun</text>
  </g>

  <!-- Area Fill -->
  <path d="M 100 350 C 165 350, 165 280, 230 280 C 295 280, 295 310, 360 250 C 425 190, 425 220, 490 150 C 555 80, 555 120, 620 90 C 685 60, 685 50, 750 40 L 750 400 L 100 400 Z" fill="url(#areaGrad)" />

  <!-- Data Line -->
  <path d="M 100 350 C 165 350, 165 280, 230 280 C 295 280, 295 310, 360 250 C 425 190, 425 220, 490 150 C 555 80, 555 120, 620 90 C 685 60, 685 50, 750 40" fill="none" stroke="url(#lineGrad)" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />

  <!-- Data Points -->
  <g fill="#ffffff" stroke="#00a651" stroke-width="3">
    <circle cx="100" cy="350" r="6" />
    <circle cx="230" cy="280" r="6" />
    <circle cx="360" cy="250" r="6" />
    <circle cx="490" cy="150" r="6" />
    <circle cx="620" cy="90" r="6" />
    <circle cx="750" cy="40" r="8" stroke="#0056b3" stroke-width="4" />
  </g>

  <!-- Tooltip -->
  <g transform="translate(680, 10)">
    <rect width="100" height="40" rx="8" fill="#1e293b" />
    <text x="50" y="25" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">+30% Rev</text>
    <polygon points="50,40 45,48 55,48" fill="#1e293b" transform="rotate(180 50 44)" />
  </g>
</svg>
