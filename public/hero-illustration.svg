<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0f7ff" />
      <stop offset="100%" stop-color="#e6f4ea" />
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0072bc" />
      <stop offset="100%" stop-color="#003b73" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009245" />
      <stop offset="100%" stop-color="#39b54a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="15" flood-opacity="0.1" />
    </filter>
  </defs>
  
  <rect width="800" height="800" fill="url(#bgGrad)" />
  
  <!-- Abstract Shapes -->
  <circle cx="600" cy="200" r="150" fill="#0056b3" opacity="0.05" />
  <circle cx="200" cy="600" r="200" fill="#00a651" opacity="0.05" />
  
  <!-- Dashboard Card -->
  <g transform="translate(150, 150)" filter="url(#shadow)">
    <rect width="500" height="400" rx="20" fill="#ffffff" />
    
    <!-- Header -->
    <rect x="30" y="30" width="150" height="20" rx="10" fill="#e2e8f0" />
    <rect x="420" y="30" width="50" height="20" rx="10" fill="#e2e8f0" />
    
    <!-- Chart Area -->
    <path d="M 50 300 L 150 250 L 250 280 L 350 150 L 450 100" fill="none" stroke="url(#greenGrad)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- Data Points -->
    <circle cx="50" cy="300" r="8" fill="#00a651" />
    <circle cx="150" cy="250" r="8" fill="#00a651" />
    <circle cx="250" cy="280" r="8" fill="#00a651" />
    <circle cx="350" cy="150" r="8" fill="#00a651" />
    <circle cx="450" cy="100" r="12" fill="#0056b3" />
    <circle cx="450" cy="100" r="6" fill="#ffffff" />
    
    <!-- Bars -->
    <rect x="60" y="320" width="30" height="40" rx="5" fill="#0056b3" opacity="0.2" />
    <rect x="160" y="300" width="30" height="60" rx="5" fill="#0056b3" opacity="0.4" />
    <rect x="260" y="280" width="30" height="80" rx="5" fill="#0056b3" opacity="0.6" />
    <rect x="360" y="220" width="30" height="140" rx="5" fill="#0056b3" opacity="0.8" />
    <rect x="460" y="150" width="30" height="210" rx="5" fill="url(#blueGrad)" />
  </g>
  
  <!-- Floating Elements -->
  <g transform="translate(100, 450)" filter="url(#shadow)">
    <rect width="200" height="120" rx="15" fill="#ffffff" />
    <circle cx="40" cy="60" r="20" fill="#e6f4ea" />
    <path d="M 30 60 L 38 68 L 50 52" fill="none" stroke="#00a651" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="80" y="45" width="80" height="12" rx="6" fill="#e2e8f0" />
    <rect x="80" y="65" width="50" height="10" rx="5" fill="#cbd5e1" />
  </g>
  
  <g transform="translate(550, 250)" filter="url(#shadow)">
    <rect width="180" height="180" rx="15" fill="#ffffff" />
    <!-- Cross -->
    <path d="M 90 50 v 80 M 50 90 h 80" fill="none" stroke="url(#blueGrad)" stroke-width="20" stroke-linecap="round" />
  </g>
</svg>
