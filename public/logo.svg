<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 250" width="100%" height="100%">
  <defs>
    <!-- Gradients -->
    <linearGradient id="globeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0072bc" />
      <stop offset="100%" stop-color="#003b73" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#009245" />
      <stop offset="100%" stop-color="#39b54a" />
    </linearGradient>
    <linearGradient id="crossGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f2f2f2" />
    </linearGradient>
    
    <!-- Drop Shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- Logo Icon Group -->
  <g transform="translate(50, 25)" filter="url(#shadow)">
    <!-- Globe Base -->
    <circle cx="100" cy="100" r="90" fill="url(#globeGrad)" />
    
    <!-- Globe Grid Lines (Latitudes) -->
    <path d="M 15 70 Q 100 90 185 70" fill="none" stroke="#4da6ff" stroke-width="2" opacity="0.6" />
    <path d="M 10 100 Q 100 120 190 100" fill="none" stroke="#4da6ff" stroke-width="2" opacity="0.6" />
    <path d="M 15 130 Q 100 150 185 130" fill="none" stroke="#4da6ff" stroke-width="2" opacity="0.6" />
    
    <!-- Globe Grid Lines (Longitudes) -->
    <path d="M 70 15 Q 90 100 70 185" fill="none" stroke="#4da6ff" stroke-width="2" opacity="0.6" />
    <path d="M 100 10 L 100 190" fill="none" stroke="#4da6ff" stroke-width="2" opacity="0.6" />
    <path d="M 130 15 Q 110 100 130 185" fill="none" stroke="#4da6ff" stroke-width="2" opacity="0.6" />

    <!-- White Cross -->
    <path d="M 130 60 h 30 v 30 h 30 v 30 h -30 v 30 h -30 v -30 h -30 v -30 h 30 z" fill="url(#crossGrad)" />

    <!-- Green Leaf/Swoosh -->
    <path d="M 5 130 C 30 190, 120 220, 185 150 C 150 190, 60 180, 5 130 Z" fill="url(#leafGrad)" />
    <path d="M 15 145 C 40 195, 110 210, 175 160 C 140 190, 60 185, 15 145 Z" fill="#006837" opacity="0.3" />
  </g>

  <!-- Text Group -->
  <g transform="translate(280, 130)">
    <!-- "Med" -->
    <text x="0" y="0" font-family="Arial, sans-serif" font-weight="900" font-size="110" fill="#0056b3" letter-spacing="-2">Med</text>
    <!-- "vix" -->
    <text x="225" y="0" font-family="Arial, sans-serif" font-weight="900" font-size="110" fill="#00a651" letter-spacing="-2">vix</text>
    
    <!-- "- SOLUTIONS -" -->
    <text x="20" y="50" font-family="Arial, sans-serif" font-weight="700" font-size="32" fill="#6c757d" letter-spacing="8">— S O L U T I O N S —</text>
  </g>
</svg>
